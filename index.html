<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalAI Testbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --border2:   #333;
      --text:      #e8e8e8;
      --muted:     #666;
      --dim:       #444;
      --green:     #4ade80;
      --green-dim: #166534;
      --blue:      #60a5fa;
      --orange:    #fb923c;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .shell {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 80px;
      flex: 1;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .header-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      letter-spacing: 0.05em;
    }

    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .header-version {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 32px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-row:last-child { border-bottom: none; }

    .panel-empty {
      padding: 16px;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── Model row ── */
    .model-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .model-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      flex: 1;
    }

    .model-id {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
      white-space: nowrap;
    }

    .tag--default {
      color: var(--green);
      border-color: var(--green-dim);
      background: rgba(74,222,128,0.07);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: #222; border-color: #555; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn--green {
      border-color: var(--green-dim);
      color: var(--green);
    }
    .btn--green:hover { background: rgba(74,222,128,0.08); border-color: var(--green); }

    .btn--blue {
      border-color: #1e3a5f;
      color: var(--blue);
    }
    .btn--blue:hover { background: rgba(96,165,250,0.08); border-color: var(--blue); }

    .btn--red {
      border-color: #3f1515;
      color: var(--red);
    }
    .btn--red:hover { background: rgba(248,113,113,0.08); border-color: var(--red); }

    .btn--run {
      padding: 8px 20px;
      font-size: 12px;
    }

    /* ── Prompt area ── */
    .prompt-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .prompt-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .prompt-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex: 1;
    }

    .model-select {
      font-family: var(--mono);
      font-size: 11px;
      background: #1e1e1e;
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
    }

    .model-select:focus { outline: 1px solid var(--blue); }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 90px;
      outline: none;
    }

    textarea::placeholder { color: var(--dim); }

    .prompt-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
    }

    .system-toggle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .system-toggle:hover { color: var(--text); }

    .system-wrap {
      padding: 0 16px 12px;
      display: none;
    }
    .system-wrap.open { display: block; }

    .system-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    textarea.system-ta {
      min-height: 56px;
      font-size: 12px;
      padding: 8px 0;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      resize: none;
    }

    /* ── Output ── */
    .output-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .output-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .output-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex: 1;
    }

    .output-status {
      font-family: var(--mono);
      font-size: 10px;
    }

    .status--idle     { color: var(--muted); }
    .status--running  { color: var(--blue); }
    .status--done     { color: var(--green); }
    .status--aborted  { color: var(--orange); }
    .status--error    { color: var(--red); }

    .output-body {
      padding: 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      min-height: 120px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-empty {
      color: var(--dim);
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: var(--blue);
      vertical-align: text-bottom;
      animation: blink 0.9s steps(1) infinite;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Log ── */
    .log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
    }

    .log-line { display: flex; gap: 10px; padding: 1px 0; }
    .log-time { color: var(--dim); flex-shrink: 0; }
    .log-msg--ok  { color: var(--green); }
    .log-msg--err { color: var(--red); }
    .log-msg--info { color: var(--blue); }
    .log-msg--warn { color: var(--orange); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* ── Init bar ── */
    .init-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .init-status {
      font-family: var(--mono);
      font-size: 12px;
      flex: 1;
    }

    .init-status.connected { color: var(--green); }
    .init-status.error     { color: var(--red); }
    .init-status.pending   { color: var(--muted); }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <span class="header-logo">◆ LocalAI</span>
    <span class="header-title">Testbench</span>
    <span class="header-version">v0.2</span>
  </div>

  <!-- Init bar -->
  <div class="init-bar">
    <span class="init-status pending" id="initStatus">Not connected — click Init to start</span>
    <button class="btn btn--green" id="btnInit">Init</button>
    <button class="btn" id="btnResetPerm" title="Reset stored permission">Reset perm</button>
  </div>

  <!-- Models section -->
  <div class="section">
    <div class="section-label">Cached models</div>
    <div class="panel" id="modelList">
      <div class="panel-empty">Run Init to detect models.</div>
    </div>
    <div style="margin-top:8px; display:flex; gap:8px;">
      <button class="btn btn--blue" id="btnRefresh" disabled>↻ Refresh list</button>
    </div>
  </div>

  <hr class="divider" />

  <!-- Prompt section -->
  <div class="section">
    <div class="section-label">Inference</div>

    <div class="prompt-wrap">
      <div class="prompt-toolbar">
        <span class="prompt-label">system</span>
        <span class="system-toggle" id="sysToggle">▸ add system prompt</span>
      </div>
      <div class="system-wrap" id="sysWrap">
        <div class="system-label">System</div>
        <textarea class="system-ta" id="systemInput" placeholder="You are a helpful assistant."></textarea>
      </div>

      <div class="prompt-toolbar" style="border-top: 1px solid var(--border); margin-top:0;">
        <span class="prompt-label">model</span>
        <select class="model-select" id="modelSelect">
          <option value="">— none cached —</option>
        </select>
      </div>

      <textarea id="promptInput" placeholder="Type a message and press Run…" rows="4"></textarea>

      <div class="prompt-footer">
        <button class="btn btn--green btn--run" id="btnRun" disabled>▶ Run</button>
        <button class="btn btn--red btn--run" id="btnStop" disabled>■ Stop</button>
        <button class="btn" id="btnClear" style="margin-left:auto;">Clear</button>
      </div>
    </div>
  </div>

  <!-- Output section -->
  <div class="section">
    <div class="section-label">Output</div>
    <div class="output-wrap">
      <div class="output-toolbar">
        <span class="output-label">response</span>
        <span class="output-status status--idle" id="outputStatus">idle</span>
        <button class="btn" id="btnCopyOutput" style="font-size:10px; padding:2px 8px;">copy</button>
      </div>
      <div class="output-body" id="outputBody">
        <span class="output-empty">Output will appear here…</span>
      </div>
    </div>
  </div>

  <hr class="divider" />

  <!-- Event log -->
  <div class="section">
    <div class="section-label">Event log</div>
    <div class="panel" style="padding: 12px 16px; max-height: 220px; overflow-y: auto;">
      <div class="log" id="logEl"></div>
    </div>
  </div>

</div>

<script type="module">
import localai from "./localai.js";

// ── Refs ───────────────────────────────────────────────────────────────────────
const initStatus   = document.getElementById("initStatus");
const btnInit      = document.getElementById("btnInit");
const btnResetPerm = document.getElementById("btnResetPerm");
const btnRefresh   = document.getElementById("btnRefresh");
const modelList    = document.getElementById("modelList");
const modelSelect  = document.getElementById("modelSelect");
const sysToggle    = document.getElementById("sysToggle");
const sysWrap      = document.getElementById("sysWrap");
const systemInput  = document.getElementById("systemInput");
const promptInput  = document.getElementById("promptInput");
const btnRun       = document.getElementById("btnRun");
const btnStop      = document.getElementById("btnStop");
const btnClear     = document.getElementById("btnClear");
const outputBody   = document.getElementById("outputBody");
const outputStatus = document.getElementById("outputStatus");
const btnCopyOutput= document.getElementById("btnCopyOutput");
const logEl        = document.getElementById("logEl");

let currentAbort = null; // fn to abort running inference

// ── Logging ────────────────────────────────────────────────────────────────────
function log(msg, type = "info") {
  const now = new Date().toTimeString().slice(0, 8);
  const line = document.createElement("div");
  line.className = "log-line";
  line.innerHTML = `<span class="log-time">${now}</span><span class="log-msg--${type}">${escHtml(msg)}</span>`;
  logEl.appendChild(line);
  logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Status helpers ─────────────────────────────────────────────────────────────
function setOutputStatus(state, text) {
  outputStatus.className = `output-status status--${state}`;
  outputStatus.textContent = text;
}

function setInitConnected(msg) {
  initStatus.className = "init-status connected";
  initStatus.textContent = msg;
}

function setInitError(msg) {
  initStatus.className = "init-status error";
  initStatus.textContent = msg;
}

// ── Render model list ──────────────────────────────────────────────────────────
async function renderModels() {
  let models;
  try {
    models = await localai.models();
  } catch (e) {
    log(`models() failed: ${e.message}`, "err");
    return;
  }

  modelList.innerHTML = "";
  modelSelect.innerHTML = "";

  if (models.length === 0) {
    modelList.innerHTML = `<div class="panel-empty">No cached models found. Download one from the dashboard.</div>`;
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "— none cached —";
    modelSelect.appendChild(opt);
    btnRun.disabled = true;
    return;
  }

  models.forEach((m) => {
    // Panel row
    const row = document.createElement("div");
    row.className = "panel-row";
    row.innerHTML = `
      <div class="model-dot"></div>
      <span class="model-name">${escHtml(m.name)}</span>
      <span class="model-id">${escHtml(m.id)}</span>
      ${m.default ? `<span class="tag tag--default">default</span>` : ""}
      <button class="btn btn--green" data-id="${escHtml(m.id)}" data-name="${escHtml(m.name)}"
        style="font-size:10px; padding:3px 10px;"
        ${m.default ? "disabled" : ""}>
        ${m.default ? "✓ default" : "set default"}
      </button>
    `;
    modelList.appendChild(row);

    // Select option
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.name + (m.default ? " (default)" : "");
    if (m.default) opt.selected = true;
    modelSelect.appendChild(opt);
  });

  btnRun.disabled = false;

  // Wire up "set default" buttons
  modelList.querySelectorAll("button[data-id]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const id   = btn.dataset.id;
      const name = btn.dataset.name;
      try {
        await localai.setDefaultModel(id);
        log(`Default model set → ${name}`, "ok");
        await renderModels();
      } catch (e) {
        log(`setDefaultModel failed: ${e.message}`, "err");
      }
    });
  });
}

// ── Init ───────────────────────────────────────────────────────────────────────
btnInit.addEventListener("click", async () => {
  btnInit.disabled = true;
  initStatus.className = "init-status pending";
  initStatus.textContent = "Connecting…";
  log("Calling localai.init()…");

  try {
    await localai.init();
    setInitConnected("Connected ✓");
    log("init() succeeded", "ok");
    btnRefresh.disabled = false;
    await renderModels();
  } catch (e) {
    setInitError(`Error: ${e.message}`);
    log(`init() failed: ${e.message}`, "err");
    btnInit.disabled = false;
  }
});

// ── Reset permission ───────────────────────────────────────────────────────────
btnResetPerm.addEventListener("click", () => {
  localai.resetPermission();
  initStatus.className = "init-status pending";
  initStatus.textContent = "Permission reset — click Init to reconnect";
  btnInit.disabled = false;
  btnRefresh.disabled = true;
  btnRun.disabled = true;
  modelList.innerHTML = `<div class="panel-empty">Run Init to detect models.</div>`;
  modelSelect.innerHTML = `<option value="">— none cached —</option>`;
  log("Permission reset", "warn");
});

// ── Refresh ────────────────────────────────────────────────────────────────────
btnRefresh.addEventListener("click", async () => {
  log("Refreshing model list…");
  await renderModels();
  log("Model list refreshed", "ok");
});

// ── System prompt toggle ───────────────────────────────────────────────────────
sysToggle.addEventListener("click", () => {
  const open = sysWrap.classList.toggle("open");
  sysToggle.textContent = open ? "▾ system prompt" : "▸ add system prompt";
});

// ── Run inference ──────────────────────────────────────────────────────────────
btnRun.addEventListener("click", async () => {
  const text = promptInput.value.trim();
  if (!text) return;

  const system = systemInput.value.trim();
  const modelId = modelSelect.value;
  const modelName = modelSelect.options[modelSelect.selectedIndex]?.text ?? "";

  const messages = [];
  if (system) messages.push({ role: "system", content: system });
  messages.push({ role: "user", content: text });

  // UI
  outputBody.innerHTML = `<span class="cursor"></span>`;
  setOutputStatus("running", "running…");
  btnRun.disabled = true;
  btnStop.disabled = false;
  log(`Sending to ${modelName || modelId}…`, "info");

  let tokens = "";
  let wasAborted = false;

  const { promise, abort } = localai.promptAbortable({
    model: modelId || undefined,
    messages,
    onToken: (token) => {
      tokens += token;
      const cursor = outputBody.querySelector(".cursor");
      if (cursor) {
        cursor.insertAdjacentText("beforebegin", token);
      } else {
        outputBody.textContent = tokens;
      }
    },
  });

  currentAbort = () => { wasAborted = true; abort(); };

  try {
    await promise;
    setOutputStatus(wasAborted ? "aborted" : "done", wasAborted ? "stopped" : "done");
    log(wasAborted ? "Inference stopped by user" : `Done (${tokens.length} chars)`, wasAborted ? "warn" : "ok");
  } catch (e) {
    setOutputStatus("error", "error");
    log(`Inference error: ${e.message}`, "err");
    outputBody.textContent = `Error: ${e.message}`;
  } finally {
    // Remove blinking cursor
    const cursor = outputBody.querySelector(".cursor");
    if (cursor) cursor.remove();
    btnRun.disabled = false;
    btnStop.disabled = true;
    currentAbort = null;
  }
});

// ── Stop ───────────────────────────────────────────────────────────────────────
btnStop.addEventListener("click", () => {
  if (currentAbort) {
    log("Abort requested…", "warn");
    currentAbort();
  }
});

// ── Clear output ───────────────────────────────────────────────────────────────
btnClear.addEventListener("click", () => {
  outputBody.innerHTML = `<span class="output-empty">Output will appear here…</span>`;
  setOutputStatus("idle", "idle");
});

// ── Copy output ────────────────────────────────────────────────────────────────
btnCopyOutput.addEventListener("click", () => {
  const text = outputBody.textContent;
  if (!text || text === "Output will appear here…") return;
  navigator.clipboard.writeText(text).then(() => {
    btnCopyOutput.textContent = "copied!";
    setTimeout(() => { btnCopyOutput.textContent = "copy"; }, 1500);
  });
});

// ── Keyboard shortcut: Ctrl+Enter to run ──────────────────────────────────────
promptInput.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    if (!btnRun.disabled) btnRun.click();
  }
});

log("Testbench ready. Click Init to connect.", "info");
</script>
</body>
</html>
