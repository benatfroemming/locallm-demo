<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalAI — test harness</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e10;
      --surface:     #18181c;
      --surface-2:   #202026;
      --border:      #2e2e38;
      --border-2:    #3a3a48;
      --text:        #e8e8f0;
      --text-2:      #8888a0;
      --text-3:      #555568;
      --accent:      #7c6fff;
      --accent-dim:  #2d2850;
      --green:       #22c55e;
      --green-dim:   #14291e;
      --green-b:     #1a4a2e;
      --red:         #f87171;
      --red-dim:     #2a0a0a;
      --orange:      #f97316;
      --orange-dim:  #271600;
      --blue:        #60a5fa;
      --blue-dim:    #0e1d33;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      grid-column: 1 / -1;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 2px 8px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 4px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background .3s;
    }
    .status-dot.connected  { background: var(--green);  animation: pulse 1.4s ease-in-out infinite; }
    .status-dot.error      { background: var(--red); }
    .status-dot.connecting { background: var(--orange); animation: pulse .8s ease-in-out infinite; }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.8); }
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
    }

    select, textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    select:focus, textarea:focus { border-color: var(--accent); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .slider-val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
      min-width: 32px;
      text-align: right;
    }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 5px;
      border: 1px solid var(--border-2);
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      width: 100%;
      transition: background .12s, border-color .12s, color .12s;
      text-align: center;
    }
    .btn:hover { background: var(--surface); color: var(--text); border-color: var(--text-3); }

    .btn--primary {
      background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
    }
    .btn--primary:hover { background: var(--accent); color: #fff; }

    .btn--danger { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .btn--danger:hover { background: var(--red); color: #fff; }

    .btn--ghost { background: transparent; border-color: var(--border); color: var(--text-3); }
    .btn--ghost:hover { background: var(--surface-2); color: var(--text-2); }

    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-row { display: flex; gap: 6px; }

    /* ── Chat area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 100%;
    }

    .message-role {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .message--user .message-role  { color: var(--accent); }
    .message--assistant .message-role { color: var(--green); }
    .message--system .message-role { color: var(--orange); }
    .message--error .message-role  { color: var(--red); }

    .message-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message--user      .message-body { background: var(--accent-dim); border-color: #4a3ea0; }
    .message--assistant .message-body { background: var(--green-dim);  border-color: var(--green-b); }
    .message--error     .message-body { background: var(--red-dim);    border-color: #6a1a1a; color: var(--red); }
    .message--system    .message-body { background: var(--orange-dim); border-color: #4a2800; font-family: var(--mono); font-size: 12px; }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--green);
      border-radius: 2px;
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink .85s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-bar textarea {
      flex: 1;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      border-radius: 6px;
    }

    .send-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      transition: background .12s, color .12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent); color: #fff; }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Model cards in sidebar ── */
    .model-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .model-pill:hover { border-color: var(--border-2); }
    .model-pill.selected { border-color: var(--accent); background: var(--accent-dim); }
    .model-pill-dot { width:5px; height:5px; border-radius:50%; background:var(--text-3); flex-shrink:0; }
    .model-pill.default .model-pill-dot { background: var(--green); }
    .model-pill-name { font-family:var(--mono); font-size:11px; color:var(--text-2); flex:1; }
    .model-pill.selected .model-pill-name { color:var(--accent); }
    .model-pill-badge {
      font-family:var(--mono); font-size:9px; letter-spacing:.05em;
      padding:1px 5px; border-radius:3px;
      background:var(--green-dim); color:var(--green); border:1px solid var(--green-b);
    }

    .empty-state {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-3);
      padding: 8px 0;
    }

    /* ── API log ── */
    .log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log-line { display: block; }
    .log-line.ok   { color: var(--green); }
    .log-line.err  { color: var(--red); }
    .log-line.info { color: var(--blue); }

    /* ── Welcome ── */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 48px 24px;
      max-width: 360px;
    }
    .welcome-icon { font-size: 36px; margin-bottom: 16px; }
    .welcome h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .welcome p  { font-size: 13px; color: var(--text-2); line-height: 1.7; }
  </style>
</head>
<body>

<div class="layout">

  <!-- Header -->
  <header class="header">
    <span class="header-tag">LocalAI</span>
    <h1>Test harness</h1>
    <div class="header-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">disconnected</span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Connection -->
    <div>
      <p class="section-label">Connection</p>
      <div class="btn-row">
        <button class="btn btn--primary" id="btn-connect">Connect</button>
        <button class="btn btn--ghost"   id="btn-disconnect" disabled>Disconnect</button>
      </div>
    </div>

    <!-- Available models -->
    <div>
      <p class="section-label">Available models</p>
      <div id="model-list">
        <p class="empty-state">Connect first to see models.</p>
      </div>
      <button class="btn btn--ghost" id="btn-refresh" disabled style="margin-top:6px;">
        ↺ Refresh
      </button>
    </div>

    <!-- Generation params -->
    <div>
      <p class="section-label">Parameters</p>
      <div class="field" style="margin-bottom:10px;">
        <label>System prompt</label>
        <textarea id="system-prompt" rows="3" style="resize:vertical;">You are a helpful assistant. Be concise.</textarea>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Max tokens</label>
        <div class="slider-row">
          <input type="range" id="max-tokens" min="32" max="1024" step="32" value="256" />
          <span class="slider-val" id="max-tokens-val">256</span>
        </div>
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Temperature</label>
        <div class="slider-row">
          <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7" />
          <span class="slider-val" id="temperature-val">0.70</span>
        </div>
      </div>
      <div class="field">
        <label>Top-p</label>
        <div class="slider-row">
          <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9" />
          <span class="slider-val" id="top-p-val">0.90</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div>
      <p class="section-label">Actions</p>
      <button class="btn btn--ghost"   id="btn-clear"   style="margin-bottom:6px;">Clear chat</button>
      <button class="btn btn--danger"  id="btn-cancel"  disabled>Cancel generation</button>
    </div>

    <!-- API log -->
    <div>
      <p class="section-label">API log</p>
      <div class="log" id="api-log"></div>
    </div>

  </aside>

  <!-- Chat area -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>LocalAI test harness</h2>
        <p>
          Enter your bridge URL, click <strong>Connect</strong>, then start chatting
          with your locally-cached models — no API keys, no network calls.
        </p>
      </div>
    </div>

    <div class="input-bar">
      <textarea
        id="user-input"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        rows="1"
        disabled
      ></textarea>
      <button class="send-btn" id="btn-send" disabled title="Send">➤</button>
    </div>
  </main>

</div>

<script type="module">
import { LocalAI } from "./localai.js";

// ── State ──────────────────────────────────────────────────────────────────────

let ai             = null;
let selectedModel  = null;  // id of the model selected in the sidebar
let generating     = false;
let currentRunId   = null;
let conversationHistory = [];   // [{role, content}, ...]

// ── DOM refs ───────────────────────────────────────────────────────────────────

const BRIDGE_URL = "https://benatfroemming.github.io/locallm/bridge.html";
const $statusDot   = document.getElementById("status-dot");
const $statusText  = document.getElementById("status-text");
const $modelList   = document.getElementById("model-list");
const $messages    = document.getElementById("messages");
const $userInput   = document.getElementById("user-input");
const $btnConnect  = document.getElementById("btn-connect");
const $btnDisc     = document.getElementById("btn-disconnect");
const $btnRefresh  = document.getElementById("btn-refresh");
const $btnSend     = document.getElementById("btn-send");
const $btnCancel   = document.getElementById("btn-cancel");
const $btnClear    = document.getElementById("btn-clear");
const $apiLog      = document.getElementById("api-log");
const $maxTokens   = document.getElementById("max-tokens");
const $temperature = document.getElementById("temperature");
const $topP        = document.getElementById("top-p");
const $systemPmt   = document.getElementById("system-prompt");

// ── Logging ────────────────────────────────────────────────────────────────────

function log(msg, kind = "info") {
  const ts   = new Date().toLocaleTimeString("en", { hour12: false });
  const line = document.createElement("span");
  line.className = `log-line ${kind}`;
  line.textContent = `[${ts}] ${msg}`;
  $apiLog.appendChild(line);
  $apiLog.appendChild(document.createElement("br"));
  $apiLog.scrollTop = $apiLog.scrollHeight;
}

// ── Status helpers ─────────────────────────────────────────────────────────────

function setStatus(state, label) {
  $statusDot.className  = `status-dot ${state}`;
  $statusText.textContent = label;
}

// ── Slider labels ──────────────────────────────────────────────────────────────

$maxTokens.addEventListener("input",   () => document.getElementById("max-tokens-val").textContent  = $maxTokens.value);
$temperature.addEventListener("input", () => document.getElementById("temperature-val").textContent = parseFloat($temperature.value).toFixed(2));
$topP.addEventListener("input",        () => document.getElementById("top-p-val").textContent       = parseFloat($topP.value).toFixed(2));

// ── Auto-grow textarea ─────────────────────────────────────────────────────────

$userInput.addEventListener("input", () => {
  $userInput.style.height = "auto";
  $userInput.style.height = Math.min($userInput.scrollHeight, 160) + "px";
});

// ── Connect ────────────────────────────────────────────────────────────────────

$btnConnect.addEventListener("click", async () => {
  $btnConnect.disabled = true;
  setStatus("connecting", "connecting…");
  log(`Connecting to ${BRIDGE_URL}…`);

  ai = new LocalAI({ bridgeUrl: BRIDGE_URL });

  try {
    await ai.connect();
    setStatus("connected", "connected");
    log("Handshake complete.", "ok");

    $btnConnect.disabled  = false;
    $btnDisc.disabled     = false;
    $btnRefresh.disabled  = false;
    $userInput.disabled   = false;
    $btnSend.disabled     = false;

    clearWelcome();
    await refreshModels();

  } catch (err) {
    setStatus("error", "error");
    log(err.message, "err");
    addSystemMessage(`Connection failed: ${err.message}`, "error");
    ai = null;
    $btnConnect.disabled = false;
  }
});

// ── Disconnect ─────────────────────────────────────────────────────────────────

$btnDisc.addEventListener("click", () => {
  if (!ai) return;
  ai.disconnect();
  ai = null;
  selectedModel = null;

  setStatus("", "disconnected");
  log("Disconnected.");

  $btnConnect.disabled  = false;
  $btnDisc.disabled     = true;
  $btnRefresh.disabled  = true;
  $userInput.disabled   = true;
  $btnSend.disabled     = true;
  $btnCancel.disabled   = true;

  $modelList.innerHTML = `<p class="empty-state">Connect first to see models.</p>`;
});

// ── Refresh models ─────────────────────────────────────────────────────────────

async function refreshModels() {
  log("Fetching model list…");
  try {
    const models = await ai.getModels();
    log(`${models.length} model(s) cached.`, "ok");
    renderModels(models);

    // Auto-select the default
    const def = models.find((m) => m.isDefault);
    if (def) selectedModel = def.id;

  } catch (err) {
    log(`getModels() failed: ${err.message}`, "err");
  }
}

$btnRefresh.addEventListener("click", refreshModels);

function renderModels(models) {
  if (!models.length) {
    $modelList.innerHTML = `<p class="empty-state">No models downloaded yet.</p>`;
    return;
  }

  $modelList.innerHTML = "";
  for (const m of models) {
    const pill = document.createElement("div");
    pill.className = `model-pill${m.isDefault ? " default" : ""}${selectedModel === m.id ? " selected" : ""}`;
    pill.innerHTML = `
      <div class="model-pill-dot"></div>
      <span class="model-pill-name">${m.name}</span>
      ${m.isDefault ? `<span class="model-pill-badge">default</span>` : ""}
    `;
    pill.addEventListener("click", () => {
      selectedModel = m.id;
      renderModels(models);  // re-render to update selection highlight
      log(`Selected model: ${m.name}`);
    });
    $modelList.appendChild(pill);
  }
}

// ── Chat ───────────────────────────────────────────────────────────────────────

function clearWelcome() {
  const welcome = $messages.querySelector(".welcome");
  if (welcome) welcome.remove();
}

function addMessage(role, content, streaming = false) {
  const div = document.createElement("div");
  div.className = `message message--${role}`;
  div.innerHTML = `
    <span class="message-role">${role}</span>
    <div class="message-body">${escHtml(content)}${streaming ? '<span class="cursor"></span>' : ""}</div>
  `;
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div.querySelector(".message-body");
}

function addSystemMessage(text, kind = "system") {
  const div = document.createElement("div");
  div.className = `message message--${kind}`;
  div.innerHTML = `
    <span class="message-role">${kind === "error" ? "error" : "system"}</span>
    <div class="message-body">${escHtml(text)}</div>
  `;
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function sendMessage() {
  if (!ai || generating) return;

  const text = $userInput.value.trim();
  if (!text) return;

  clearWelcome();
  $userInput.value = "";
  $userInput.style.height = "auto";

  // Add to UI and history
  addMessage("user", text);
  conversationHistory.push({ role: "user", content: text });

  // Build full message list (system + history)
  const systemText = $systemPmt.value.trim();
  const messages = [
    ...(systemText ? [{ role: "system", content: systemText }] : []),
    ...conversationHistory,
  ];

  // Start generating
  generating = true;
  $btnSend.disabled   = true;
  $btnCancel.disabled = false;
  $userInput.disabled = true;

  const bodyEl = addMessage("assistant", "", true);

  log(`run() → model=${selectedModel ?? "default"}, maxTokens=${$maxTokens.value}, temp=${$temperature.value}`);

  try {
    const { id, text: fullText } = await ai.run({
      messages,
      modelId:     selectedModel ?? undefined,
      maxTokens:   parseInt($maxTokens.value),
      temperature: parseFloat($temperature.value),
      top_p:       parseFloat($topP.value),
      onToken: (token) => {
        // Remove cursor, append token, re-add cursor
        const cursor = bodyEl.querySelector(".cursor");
        if (cursor) cursor.remove();
        bodyEl.textContent += token;
        bodyEl.innerHTML += '<span class="cursor"></span>';
        $messages.scrollTop = $messages.scrollHeight;
      },
    });

    currentRunId = id;

    // Finalise: strip cursor
    bodyEl.querySelector(".cursor")?.remove();

    conversationHistory.push({ role: "assistant", content: fullText });
    log(`Done. ${fullText.length} chars.`, "ok");

  } catch (err) {
    bodyEl.querySelector(".cursor")?.remove();
    bodyEl.textContent = `[error: ${err.message}]`;
    bodyEl.closest(".message").classList.add("message--error");
    log(err.message, "err");
  }

  generating      = false;
  currentRunId    = null;
  $btnSend.disabled   = false;
  $btnCancel.disabled = true;
  $userInput.disabled = false;
  $userInput.focus();
}

$btnSend.addEventListener("click", sendMessage);

$userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Cancel ─────────────────────────────────────────────────────────────────────

$btnCancel.addEventListener("click", () => {
  if (!generating || !currentRunId) return;
  ai.cancel(currentRunId);
  log(`Cancelled request ${currentRunId}.`, "info");
});

// ── Clear chat ─────────────────────────────────────────────────────────────────

$btnClear.addEventListener("click", () => {
  conversationHistory = [];
  $messages.innerHTML = "";
  log("Chat cleared.");
});
</script>
</body>
</html>
